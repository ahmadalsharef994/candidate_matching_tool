version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - MONGO_URI=mongodb://mongo:27017/
      - MONGO_DB_NAME=${MONGO_DB_NAME:-resumes_db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./CVs:/app/CVs
      - ./results:/app/results
    depends_on:
      - mongo
    restart: on-failure

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
