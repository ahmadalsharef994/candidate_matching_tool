name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app/main.py
          python -m py_compile match_resumes.py
          python -m py_compile ml/similarity/cosine_similarity.py
          python -m py_compile ml/vectorization/tfidf_vectorizer.py
